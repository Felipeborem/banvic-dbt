sources:
  - name: erp
    description: Esse é o sistema ERP do Banco BanVic, com dados dos clientes, colaboradores contas e etc
    schema: erp_banvic

    tables:
      #tabelas de localidades
      - name: localidades
        columns:
          - name: cod_localidade
            description: pk da tabela de localidades 
            data_tests:
              - unique
              - not_null
              
    
      - name: clientes
        columns:
          - name: cod_cliente
            description: pk da tabela de localidades 
            data_tests:
              - unique
              - not_null
      - name: agencias
        columns:
          - name: cod_agencia
            description: pk da tabela de agencias 
            data_tests:
              - unique
              - not_null
      - name: colaboradores
        columns:
          - name: cod_colaborador
            description: pk da tabela de colaboradores 
            data_tests:
              - unique
              - not_null